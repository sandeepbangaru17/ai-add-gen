<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Video Generator{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>

<div id="wakeupBanner" style="display:none;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;text-align:center;padding:10px 16px;font-size:0.85rem;font-weight:500">
  ⏳ Service is waking up — this takes ~30 seconds on first visit. Please wait…
</div>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="logo">AI<span>Video</span></a>
    <div class="nav-actions">
      <a href="/videos" class="nav-link">My Videos</a>
      <button class="theme-btn" id="themeToggle" title="Toggle theme">🌙</button>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
  // Show wake-up banner if page took >4s to load (Render free tier cold start)
  const _navStart = performance.timing ? performance.timing.navigationStart : Date.now();
  window.addEventListener("load", () => {
    const elapsed = Date.now() - _navStart;
    if (elapsed > 4000) {
      document.getElementById("wakeupBanner").style.display = "block";
      setTimeout(() => document.getElementById("wakeupBanner").style.display = "none", 8000);
    }
  });
</script>
</body>
</html>
